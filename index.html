<!doctype html>
<html lang="en" class="theme-teal-dark dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f10" />
    <title>Lelta — Household Cash Flow &amp; Ledger</title>
    <script>
      // Apply the stored theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('lelta-theme') || 'teal-dark'
          document.documentElement.className =
            t === 'ocean' ? 'theme-ocean dark' : t === 'slate-light' ? '' : 'theme-teal-dark dark'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
